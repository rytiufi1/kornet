<style>

@font-face{font-family:'GothamSSm-Medium';src:url('https://css.rbxcdn.com/2ed7693f8cf4d79466dd604c35502f76-GothamSSm-Medium.woff') format('woff'),url('https://css.rbxcdn.com/66d562e3299ee732a53db150038c026e-GothamSSm-Medium.woff2') format('woff2');font-weight:500;font-style:normal}

<style>
body{margin:0;padding:0;font-family:'GothamSSm-Book','Gotham',Arial,sans-serif!important}
.rbx-body{font-family:'GothamSSm-Book','Gotham',Arial,sans-serif!important}

<body id="rbx-body" class="rbx-body light-theme gotham-font" data-performance-relative-value="0.005" data-internal-page-name="Login" data-send-event-percentage="0">

<script>
(function() {
    function getparam(name, url) {
        if (!url) url = window.location.href;
        name = name.replace(/[\[\]]/g, '\\$&');
        var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
            results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

    function navigateAfterAuth() {
        var returnUrl = getparam('returnUrl');
        var target = (returnUrl && returnUrl.trim() !== '') ? returnUrl : '/home';
        if (window !== window.top) {
            window.parent.postMessage({ type: 'navigate', url: target }, '*');
            return;
        }
        window.location.href = target;
    }

    var isInIframe = window !== window.top;
    if (isInIframe) {
        try {
            var parentLocation = window.top.location.href;
        } catch(e) {
            return;
        }
    }
    
    if (document.cookie.includes('.ROBLOSECURITY')) {
        navigateAfterAuth();
        return;
    }
    
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/apisite/users/v1/users/authenticated', true);
    xhr.withCredentials = true;
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                var response = JSON.parse(xhr.responseText);
                if (response.id && response.name) {
                    navigateAfterAuth();
                }
            } catch(e) {}
        }
    };
    xhr.onerror = function() {};
    xhr.send();
})();

function getCookie(name) {
    var value = "; " + document.cookie;
    var parts = value.split("; " + name + "=");
    if (parts.length === 2) return parts.pop().split(";").shift();
    return null;
}

function navigateTarget(url) {
    if (window !== window.top) {
        try {
            window.top.location.href = url;
            return;
        } catch (e) {
            window.parent.postMessage({ type: 'navigate', url: url }, '*');
            return;
        }
    }
    window.location.href = url;
}

function isOAuthFlow() {
    var returnUrl = getparam('returnUrl') || '';
    return returnUrl.indexOf('/oauth/v1/authorize') !== -1;
}

function submitLogin(e) {
    e.preventDefault();
    var form = document.getElementById('login-form');
    var loginBtn = document.getElementById('login-button');
    var spinner = document.getElementById('login-spinner');
    if (loginBtn) loginBtn.style.display = 'none';
    if (spinner) spinner.style.display = 'block';
    var xhr = new XMLHttpRequest();
    var oauthFlow = isOAuthFlow();
    var endpoint = oauthFlow ? '/studio-login/v1/login' : '/login';
    xhr.open('POST', endpoint, true);
    xhr.withCredentials = true;
    if (oauthFlow) {
        xhr.setRequestHeader('Content-Type', 'application/json');
    }
    xhr.onload = function() {
        if (loginBtn) loginBtn.style.display = 'block';
        if (spinner) spinner.style.display = 'none';
        if (oauthFlow && xhr.status >= 200 && xhr.status < 300) {
            var returnUrlOAuth = getparam('returnUrl');
            var oauthTarget = (returnUrlOAuth && returnUrlOAuth.trim() !== '') ? returnUrlOAuth : '/home';
            navigateTarget(oauthTarget);
            return;
        }
        if (document.cookie.includes('.ROBLOSECURITY')) {
            var returnUrl = getparam('returnUrl');
            var target = (returnUrl && returnUrl.trim() !== '') ? returnUrl : '/home';
            navigateTarget(target);
            return;
        }
        var responseUrl = xhr.responseURL || '';
        if (responseUrl.includes('/home')) {
            var returnUrl2 = getparam('returnUrl');
            var target2 = (returnUrl2 && returnUrl2.trim() !== '') ? returnUrl2 : '/home';
            navigateTarget(target2);
        } else if (responseUrl.includes('/login/2fa') || responseUrl.includes('/login/two-step-verification') || responseUrl.includes('two-step')) {
            navigateTarget('/login/2fa');
        } else if (responseUrl.includes('loginmsg')) {
            var url = new URL(responseUrl);
            var errorMsg = url.searchParams.get('loginmsg');
            if (errorMsg) {
                var errDiv = document.getElementById('login-error-message');
                if (errDiv) {
                    errDiv.textContent = decodeURIComponent(errorMsg);
                    errDiv.style.display = 'block';
                }
            }
        }
    };
    xhr.onerror = function() {
        if (loginBtn) loginBtn.style.display = 'block';
        if (spinner) spinner.style.display = 'none';
    };
    if (oauthFlow) {
        var usernameInput = document.getElementById('login-username');
        var passwordInput = document.getElementById('login-password');
        var body = JSON.stringify({
            username: usernameInput ? usernameInput.value : '',
            password: passwordInput ? passwordInput.value : ''
        });
        xhr.send(body);
    } else {
        var formData = new FormData(form);
        xhr.send(formData);
    }
}

document.addEventListener('DOMContentLoaded', function() {
    var loginMsg = getparam('loginmsg');
    if (loginMsg && loginMsg.trim() !== '') {
        var errDiv = document.getElementById('login-error-message');
        if (errDiv) {
            errDiv.textContent = loginMsg;
            errDiv.style.display = 'block';
        }
    }
    
    var loginForm = document.getElementById('login-form');
    if (loginForm) {
        loginForm.addEventListener('submit', submitLogin);
    }
    
    var discordBtn = document.getElementById('facebook-login-button');
    if (discordBtn) {
        discordBtn.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTarget('/login-with-discord');
        });
    }
    
    var forgotLink = document.getElementById('forgot-credentials-link');
    if (forgotLink) {
        forgotLink.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTarget('/forgotpasswordOrUsername');
        });
    }
    
    var signupLink = document.getElementById('sign-up-link');
    if (signupLink) {
        signupLink.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTarget('/');
        });
    }
});
</script>

<div id="wrap" class="wrap no-gutter-ads logged-out">
    <div class="container-main" id="container-main">
        <div class="content">
            <div id="login-container" class="login-container">
                <div id="login-base">
                    <div class="section-content login-section">
                        <h2 class="login-header" id="login-title">Login to Kornet</h2>
                        <div class="login-form-container">
                            <div id="login-error-message" class="text-danger" style="display:none;color:#FF0000;font-weight:500;font-size:13px;margin-bottom:10px;"></div>
                            <form id="login-form" class="login-form" action="/login" method="POST">
                                <div class="form-group username-form-group">
                                    <input id="login-username" name="username" type="text" class="form-control input-field" placeholder="Username" required="">
                                </div>
                                <div class="form-group password-form-group">
                                    <input id="login-password" name="password" type="password" class="form-control input-field" placeholder="Password" required="">
                                </div>
                                <button id="login-button" type="submit" class="btn-full-width login-button btn-secondary-md">Log In</button>
                                <div id="login-spinner" class="spinner" style="display:none;"></div>
                                <div class="text-center forgot-credentials-link">
                                    <a id="forgot-credentials-link" class="text-link" href="/forgotpasswordOrUsername">Forgot Password or Username?</a>
                                </div>
                            </form>
                            
                            <div class="fb-divider-container">
                                <div class="rbx-divider fb-divider"></div>
                                <div class="divider-text-container">
                                    <span class="divider-text xsmall">login with your</span>
                                </div>
                            </div>
                            <a id="facebook-login-button" class="btn-full-width btn-control-md fb-button social-login" href="/login-with-discord">
                                <span class="fb-icon"></span>
                                <span style="color:#fff">Discord</span>
                            </a>
                        </div>
                    </div>
                    <div class="text-center">
                        <div class="signup-option">
                            <span class="no-account-text">Don't have an account?</span>
                            <a id="sign-up-link" class="text-link signup-link" href="/">Sign Up</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
