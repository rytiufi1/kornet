<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin panel</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --bg: #07080F;
            --surface: #0F1019;
            --card: #161821;
            --border: rgba(255, 255, 255, 0.08);
            --text: #FFFFFF;
            --dim: #6B7280;
            --red: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        #login-gate {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        #login-gate h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #login-gate p {
            color: var(--dim);
            font-size: 0.95rem;
        }

        .gate-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .gate-card input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 1rem;
            width: 100%;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        .gate-card input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .gate-card button {
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: filter 0.2s, transform 0.2s;
        }

        .gate-card button:hover {
            filter: brightness(1.08);
            transform: translateY(-2px);
        }

        .error-msg {
            color: var(--red);
            font-size: 0.85rem;
            text-align: center;
            min-height: 20px;
        }

        #dashboard {
            display: none;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--gold);
        }

        .topbar-back {
            color: var(--dim);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .topbar-back:hover {
            color: var(--text);
        }

        .dashboard-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        @media (max-width: 768px) {
            .dashboard-body {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background: var(--gold);
            color: black;
            border-radius: 99px;
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .panel-body {
            padding: 8px 0;
            max-height: 560px;
            overflow-y: auto;
        }

        .winners-panel {
            grid-column: 1 / -1;
            background: var(--card);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }

        .winners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0;
        }

        .winner-card {
            padding: 20px 24px;
            border-right: 1px solid var(--border);
        }

        .winner-card:last-child {
            border-right: none;
        }

        .winner-cat {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dim);
            margin-bottom: 8px;
        }

        .winner-game {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
        }

        .winner-votes {
            font-size: 0.78rem;
            color: var(--dim);
        }

        .winner-crown {
            font-size: 1.2rem;
            margin-bottom: 6px;
            display: block;
        }

        .result-category {
            padding: 14px 24px 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
        }

        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .result-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-row.leader .result-game {
            color: var(--gold);
            font-weight: 600;
        }

        .result-votes {
            background: var(--surface);
            border-radius: 99px;
            padding: 2px 12px;
            font-size: 0.8rem;
            color: var(--dim);
        }

        .result-row.leader .result-votes {
            background: rgba(255, 215, 0, 0.15);
            color: var(--gold);
        }

        .voter-row {
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }

        .voter-row:last-child {
            border-bottom: none;
        }

        .voter-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
        }

        .voter-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .voter-pfp {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1b3a;
            flex-shrink: 0;
        }

        .voter-identity {
            flex-grow: 1;
            min-width: 0;
        }

        .voter-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .voter-id {
            font-size: 0.7rem;
            color: var(--dim);
            font-family: monospace;
        }

        .voter-chevron {
            color: var(--dim);
            font-size: 0.75rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .voter-row.open .voter-chevron {
            transform: rotate(180deg);
        }

        .voter-votes {
            display: none;
            padding: 0 20px 14px 72px;
            flex-direction: column;
            gap: 8px;
        }

        .voter-row.open .voter-votes {
            display: flex;
        }

        .voter-vote-item {
            background: var(--surface);
            border-radius: 8px;
            padding: 10px 14px;
        }

        .voter-vote-game {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--gold);
        }

        .voter-vote-category {
            font-size: 0.75rem;
            color: var(--dim);
            margin-top: 2px;
        }

        .empty-state {
            padding: 40px 24px;
            text-align: center;
            color: var(--dim);
            font-size: 0.9rem;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 12px;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }
        
        .admin-badge {
            background: rgba(255, 215, 0, 0.15);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 12px;
        }
        
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
    </style>
</head>

<body>

    <div id="login-gate">
        <div style="text-align:center">
            <h1>admin panel</h1>
            <p style="margin-top:8px">admin panel</p>
        </div>
        <div class="gate-card">
            <input type="password" id="pw-input" placeholder="enter admin password" autocomplete="off">
            <button id="pw-btn">enter</button>
            <div class="error-msg" id="error-msg"></div>
        </div>
    </div>

    <div id="dashboard">
        <div class="topbar">
            <span class="topbar-title">admin panel</span>
            <div class="topbar-right">
                <span class="admin-badge" id="admin-name"></span>
                <button class="logout-btn" onclick="logout()">logout</button>
                <a href="/" class="topbar-back">back to voting</a>
            </div>
        </div>

        <div class="dashboard-body">
            <div class="winners-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        winners
                        <span class="badge" id="winner-count">0</span>
                    </div>
                </div>
                <div class="winners-grid" id="winners-body">
                    <div class="empty-state">loading...</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">results</div>
                    <button onclick="reloadData()"
                        style="background:none;border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem">↻
                        Refresh</button>
                </div>
                <div class="panel-body" id="results-body">
                    <div class="empty-state">loading...</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        voters
                        <span class="badge" id="voter-count">0</span>
                    </div>
                </div>
                <div class="panel-body" id="voters-body">
                    <div class="empty-state">loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const pwInput = document.getElementById('pw-input');
            const pwBtn = document.getElementById('pw-btn');
            const errorMsg = document.getElementById('error-msg');
            const loginGate = document.getElementById('login-gate');
            const dashboard = document.getElementById('dashboard');
            const adminName = document.getElementById('admin-name');

            checkSession();

            async function checkSession() {
                try {
                    const res = await fetch('/api/admin/check', {
                        credentials: 'include'
                    });
                    if (res.ok) {
                        const data = await res.json();
                        adminName.textContent = `@${data.username}`;
                        loadDashboard();
                    }
                } catch (err) {
                    console.error(err);
                }
            }

            async function loadDashboard() {
                const res = await fetch('/api/admin/results', {
                    credentials: 'include'
                });
                if (res.ok) {
                    const data = await res.json();
                    showDashboard(data);
                }
            }

            pwBtn.addEventListener('click', () => attemptLogin(pwInput.value.trim()));
            pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(pwInput.value.trim()); });

            async function attemptLogin(pass) {
                if (!pass) return;
                errorMsg.textContent = '';

                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password: pass })
                });

                if (res.ok) {
                    const data = await res.json();
                    adminName.textContent = `@${data.username}`;
                    const dataRes = await fetch('/api/admin/results', {
                        credentials: 'include'
                    });
                    if (dataRes.ok) {
                        const data = await dataRes.json();
                        showDashboard(data);
                    }
                } else {
                    const err = await res.json();
                    errorMsg.textContent = err.error || 'Access denied.';
                }
            }

            function showDashboard(data) {
                loginGate.style.display = 'none';
                dashboard.style.display = 'block';
                renderWinners(data.stats);
                renderResults(data.stats);
                renderVoters(data.voters);
            }

            function renderWinners(stats) {
                const body = document.getElementById('winners-body');
                const countEl = document.getElementById('winner-count');
                body.innerHTML = '';

                if (!stats || stats.length === 0) {
                    body.innerHTML = '<div class="empty-state">No votes yet.</div>';
                    countEl.innerText = '0';
                    return;
                }

                const grouped = new Map();
                for (const s of stats) {
                    const key = s.category;
                    if (!grouped.has(key)) grouped.set(key, []);
                    grouped.get(key).push(s);
                }

                const cats = Array.from(grouped.entries())
                    .map(([category, rows]) => ({
                        category,
                        rows,
                        total: rows.reduce((sum, r) => sum + (Number(r.counts) || 0), 0)
                    }))
                    .sort((a, b) => b.total - a.total || a.category.localeCompare(b.category));

                countEl.innerText = String(cats.length);

                for (const cat of cats) {
                    const rows = [...cat.rows].sort((a, b) => (Number(b.counts) || 0) - (Number(a.counts) || 0));
                    const topCount = Number(rows[0]?.counts) || 0;
                    const winners = rows.filter(r => (Number(r.counts) || 0) === topCount).map(r => r.game);

                    const card = document.createElement('div');
                    card.className = 'winner-card';
                    card.innerHTML = `
                        <div class="winner-cat">${cat.category}</div>
                        <div class="winner-game">${winners.join(' / ')}</div>
                        <div class="winner-votes">${topCount} vote${topCount !== 1 ? 's' : ''}${winners.length > 1 ? ' (tie)' : ''}</div>
                    `;
                    body.appendChild(card);
                }
            }

            function renderResults(stats) {
                const body = document.getElementById('results-body');
                body.innerHTML = '';

                if (!stats || stats.length === 0) {
                    body.innerHTML = '<div class="empty-state">No votes yet.</div>';
                    return;
                }

                const grouped = new Map();
                stats.forEach(s => {
                    if (!grouped.has(s.category)) grouped.set(s.category, []);
                    grouped.get(s.category).push(s);
                });

                const cats = Array.from(grouped.entries())
                    .map(([category, rows]) => ({
                        category,
                        rows,
                        total: rows.reduce((sum, r) => sum + (Number(r.counts) || 0), 0)
                    }))
                    .sort((a, b) => b.total - a.total || a.category.localeCompare(b.category));

                for (const cat of cats) {
                    const label = document.createElement('div');
                    label.className = 'result-category';
                    label.innerText = cat.category;
                    body.appendChild(label);

                    const rows = [...cat.rows].sort((a, b) => (Number(b.counts) || 0) - (Number(a.counts) || 0));
                    rows.forEach((row, idx) => {
                        const el = document.createElement('div');
                        el.className = `result-row ${idx === 0 ? 'leader' : ''}`;
                        el.innerHTML = `
                    <span class="result-game">${row.game}</span>
                    <span class="result-votes">${row.counts} vote${row.counts !== 1 ? 's' : ''}</span>
                `;
                        body.appendChild(el);
                    });
                }
            }

            function renderVoters(voters) {
                const body = document.getElementById('voters-body');
                const countEl = document.getElementById('voter-count');
                body.innerHTML = '';

                if (!voters || voters.length === 0) {
                    body.innerHTML = '<div class="empty-state">No voters yet.</div>';
                    countEl.innerText = '0';
                    return;
                }

                const byUser = {};
                voters.forEach(v => {
                    if (!byUser[v.discord_id]) {
                        byUser[v.discord_id] = {
                            username: v.username,
                            avatar: v.avatar,
                            discord_id: v.discord_id,
                            votes: []
                        };
                    }
                    byUser[v.discord_id].votes.push({ game: v.game, category: v.category });
                });

                const users = Object.values(byUser);
                countEl.innerText = users.length;

                users.forEach(user => {
                    const pfp = user.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png';
                    const row = document.createElement('div');
                    row.className = 'voter-row';

                    const votesHtml = user.votes.map(v => `
                <div class="voter-vote-item">
                    <div class="voter-vote-game">${v.game}</div>
                    <div class="voter-vote-category">${v.category}</div>
                </div>
            `).join('');

                    row.innerHTML = `
                <div class="voter-header">
                    <img class="voter-pfp" src="${pfp}" alt="${user.username}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                    <div class="voter-identity">
                        <div class="voter-name">@${user.username}</div>
                        <div class="voter-id">${user.discord_id}</div>
                    </div>
                    <span class="voter-chevron">▼</span>
                </div>
                <div class="voter-votes">${votesHtml}</div>
            `;

                    row.querySelector('.voter-header').addEventListener('click', () => {
                        row.classList.toggle('open');
                    });

                    body.appendChild(row);
                });
            }

            window.reloadData = async function () {
                const res = await fetch('/api/admin/results', {
                    credentials: 'include'
                });
                if (res.ok) {
                    const data = await res.json();
                    renderWinners(data.stats);
                    renderResults(data.stats);
                    renderVoters(data.voters);
                } else {
                    loginGate.style.display = 'flex';
                    dashboard.style.display = 'none';
                }
            };

            window.logout = async function () {
                await fetch('/api/admin/logout', { 
                    method: 'POST',
                    credentials: 'include'
                });
                window.location.reload();
            };
        })();
    </script>
</body>

</html>
